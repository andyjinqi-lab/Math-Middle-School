server {
    listen 80;
    server_name math.afinance.site;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name math.afinance.site;

    root /opt/math/app/dist;
    index index.html;

    # Replace these paths with the certificate paths generated on the server.
    ssl_certificate /etc/letsencrypt/live/math.afinance.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/math.afinance.site/privkey.pem;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Math currently follows CPA's practical pattern: frontend on this server,
    # auth/data API on Render through VITE_API_BASE_URL and VITE_API_BACKUP_BASE_URL.
    # If you later want same-origin API calls, enable a proxy here and rebuild
    # the frontend with VITE_API_BASE_URL empty or /api-aware client logic.
    #
    # location /api/ {
    #     proxy_pass https://math-api-main.onrender.com/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host math-api-main.onrender.com;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
